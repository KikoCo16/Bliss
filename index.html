<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bliss Network - Dashboard</title>
    <style>
        :root {
            --bg: #030712;
            --card: rgba(15, 23, 42, 0.6);
            --primary: #3b82f6; 
            --secondary: #1d4ed8; 
            --accent: #d946ef; 
            --danger: #4c1d95; 
            --text: #f8fafc;
            --blue-glow: 0 0 30px rgba(59, 130, 246, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #0b1528, #030712);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .network-header {
            text-align: center;
            background: var(--card);
            padding: 30px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(12px);
            box-shadow: var(--blue-glow);
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 5px;
            flex-wrap: nowrap;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            line-height: 1;
            background: linear-gradient(to bottom, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.4));
        }

        .title-logo {
            height: 2.4rem;
            width: auto;
            object-fit: contain;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        .status-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 22px;
            border-radius: 16px;
            border-left: 4px solid var(--primary);
            text-align: center;
        }

        .status-container p {
            margin-top: 0;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .status-dot {
            height: 12px; width: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            background: var(--danger);
        }

        .online .status-dot { 
            background: var(--primary); 
            box-shadow: 0 0 15px var(--primary); 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .join-button {
            display: block;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: bold;
            text-transform: uppercase;
            width: 100%;
            max-width: 320px;
            margin: 15px auto 0 auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .join-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            filter: brightness(1.15);
        }

        .player-list-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.5);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .player-list-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(8px);
            padding: 10px;
        }

        .modal-content {
            background: #090d16;
            margin: 20% auto;
            padding: 25px;
            width: 100%;
            max-width: 365px;
            border-radius: 20px;
            border: 1px solid rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.15);
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
        }

        .close { float: right; cursor: pointer; color: var(--accent); font-size: 24px; }

        @media (min-width: 850px) {
            body {
                padding: 50px;
            }
            
            .network-header {
                max-width: 900px; 
                flex-direction: row; 
                padding: 50px;
                gap: 50px;
                align-items: center;
                text-align: left;
            }

            .brand-section {
                flex: 1; 
                align-items: flex-start; 
            }

            .info-section {
                flex: 1; 
            }

            .title-container {
                justify-content: flex-start;
                gap: 15px;
            }

            h1 {
                font-size: 3.8rem;
                letter-spacing: 5px;
            }

            .title-logo {
                height: 3.8rem;
            }

            #ip-text {
                font-size: 1.1rem !important;
                margin-top: 10px !important;
                align-self: flex-start;
            }

            .join-button {
                font-size: 1.05rem;
                max-width: 100%; 
                margin: 30px 0 0 0;
                padding: 18px;
            }

            .status-container {
                text-align: left;
                padding: 30px;
            }

            .modal-content {
                margin: 10% auto;
            }
        }
    </style>
</head>
<body>

    <div class="network-header">
        
        <div class="brand-section">
            <div class="title-container">
                <img src="bliss.png" alt="Logo" class="title-logo">
                <h1>BLISS</h1>
                <img src="bliss.png" alt="Logo" class="title-logo">
            </div>
            <p id="ip-text" style="color: var(--primary); opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; font-weight: bold; font-size: 0.9rem;"></p>
            
            <a href="minecraft://?addExternalServer=Bliss|blissmc.ddns.net:19132" class="join-button">
                🎮 REJOINDRE LE SERVEUR
            </a>
        </div>

        <div class="info-section">
            <div id="status-card" class="status-container">
                <p><span class="status-dot"></span> <span id="state-text">VÉRIFICATION...</span></p>
                <div style="font-size: 1.6rem; margin: 15px 0; font-weight: bold;">
                    Joueurs : <b id="player-count" style="color: var(--primary);">0</b>
                </div>
                <button class="player-list-btn" onclick="showPlayers()">VOIR LA LISTE</button>
            </div>
        </div>

    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary); text-align: center; margin-top: 0; letter-spacing: 1px;">EN LIGNE</h2>
            <div id="playerList"></div>
        </div>
    </div>

    <script>
        const serverIP = "blissmc.ddns.net"; 
        const serverPort = "19132"; 
        let onlinePlayers = [];

        document.getElementById('ip-text').innerText = serverIP;

        async function updateStatus() {
            try {
                const res = await fetch(`https://api.mcsrvstat.us/bedrock/3/${serverIP}:${serverPort}`);
                const data = await res.json();
                
                const container = document.getElementById('status-card');
                const stateText = document.getElementById('state-text');
                const countText = document.getElementById('player-count');

                if (data.online) {
                    container.classList.add('online');
                    stateText.innerText = "SERVEUR OPÉRATIONNEL";
                    stateText.style.color = "var(--primary)";
                    countText.innerText = `${data.players.online} / ${data.players.max}`;
                    onlinePlayers = data.players.list || [];
                } else {
                    container.classList.remove('online');
                    stateText.innerText = "SERVEUR HORS-LIGNE";
                    stateText.style.color = "var(--accent)";
                    countText.innerText = "0 / 0";
                    onlinePlayers = [];
                }
            } catch (e) { 
                console.error("Erreur de connexion API"); 
            }
        }

        function showPlayers() {
            const list = document.getElementById('playerList');
            const modal = document.getElementById('playerModal');
            list.innerHTML = "";

            if (onlinePlayers.length === 0) {
                list.innerHTML = "<p style='text-align:center; opacity:0.5;'>Personne n'est connecté.</p>";
            } else {
                onlinePlayers.forEach(p => {
                    list.innerHTML += `<div class="player-item">
                        <span>${p.name || p}</span>
                        <span style="color:var(--accent); font-size:0.8em; font-weight:bold;">LIVE</span>
                    </div>`;
                });
            }
            modal.style.display = "block";
        }

        function closeModal() { document.getElementById('playerModal').style.display = "none"; }
        
        window.onclick = function(event) {
            if (event.target == document.getElementById('playerModal')) closeModal();
        }

        updateStatus();
        setInterval(updateStatus, 30000);
    </script>
</body>
</html>
